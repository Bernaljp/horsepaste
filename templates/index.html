<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Codenames</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --panel: #16213e;
            --surface: #0f3460;
            --red: #e63946;
            --blue: #2196f3;
            --neutral: #6b7280;
            --black: #111111;
            --text: #f1faee;
            --text-muted: #a8b2d8;
            --red-bg: rgba(230, 57, 70, 0.2);
            --blue-bg: rgba(33, 150, 243, 0.2);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px;
            gap: 10px;
        }

        /* ── Connection status ── */
        #conn-status {
            position: fixed;
            top: 10px;
            right: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-muted);
            z-index: 100;
        }
        #conn-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #2ecc71;
            transition: background 0.3s;
        }
        #conn-dot.disconnected { background: #e74c3c; }
        #conn-dot.reconnecting { background: #f39c12; }

        /* ── Score header ── */
        #scores {
            display: flex;
            gap: 40px;
            font-size: clamp(18px, 3vw, 26px);
            font-weight: 700;
            letter-spacing: 1px;
            padding: 10px 30px;
            background: var(--panel);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.07);
        }
        .score-red { color: var(--red); }
        .score-blue { color: var(--blue); }

        /* ── Turn banner ── */
        #turn-banner {
            width: 100%;
            max-width: 900px;
            text-align: center;
            padding: 8px 20px;
            border-radius: 8px;
            font-size: clamp(14px, 2.5vw, 18px);
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: background 0.4s, color 0.4s;
            background: var(--panel);
            color: var(--text-muted);
        }
        #turn-banner.turn-red {
            background: var(--red-bg);
            color: var(--red);
            border: 1px solid rgba(230, 57, 70, 0.4);
        }
        #turn-banner.turn-blue {
            background: var(--blue-bg);
            color: var(--blue);
            border: 1px solid rgba(33, 150, 243, 0.4);
        }

        /* ── Card grid ── */
        #card-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: clamp(4px, 0.8vw, 10px);
            width: 100%;
            max-width: 900px;
        }

        /* ── Card ── */
        .card-wrap {
            aspect-ratio: 380 / 355;
            perspective: 700px;
            cursor: pointer;
        }
        .card-wrap.no-click { cursor: default; }

        .card-inner {
            width: 100%; height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
            border-radius: 8px;
        }
        .card-wrap.revealed .card-inner { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            inset: 0;
            border-radius: 8px;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            overflow: hidden;
        }

        /* Front face — image */
        .card-front {
            background: var(--surface);
        }
        .card-front img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Back face — solid team color */
        .card-back {
            transform: rotateY(180deg);
        }
        .card-back.color-red    { background: var(--red); }
        .card-back.color-blue   { background: var(--blue); }
        .card-back.color-neutral { background: var(--neutral); }
        .card-back.color-black  { background: var(--black); }

        /* Spymaster: color tint + border on unrevealed cards */
        body.spymaster-mode .card-wrap:not(.revealed) .card-front {
            outline: 4px solid transparent;
        }
        body.spymaster-mode .card-wrap[data-color="red"]:not(.revealed) .card-front {
            outline-color: var(--red);
            box-shadow: inset 0 0 0 4px var(--red);
        }
        body.spymaster-mode .card-wrap[data-color="blue"]:not(.revealed) .card-front {
            outline-color: var(--blue);
            box-shadow: inset 0 0 0 4px var(--blue);
        }
        body.spymaster-mode .card-wrap[data-color="neutral"]:not(.revealed) .card-front {
            box-shadow: inset 0 0 0 4px var(--neutral);
        }
        body.spymaster-mode .card-wrap[data-color="black"]:not(.revealed) .card-front {
            box-shadow: inset 0 0 0 4px #888;
            background: rgba(0,0,0,0.5);
        }
        /* Subtle tint overlay in spymaster mode */
        body.spymaster-mode .card-wrap[data-color="red"]:not(.revealed) .card-front::after,
        body.spymaster-mode .card-wrap[data-color="blue"]:not(.revealed) .card-front::after,
        body.spymaster-mode .card-wrap[data-color="black"]:not(.revealed) .card-front::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        body.spymaster-mode .card-wrap[data-color="red"]:not(.revealed) .card-front::after {
            background: rgba(230, 57, 70, 0.22);
        }
        body.spymaster-mode .card-wrap[data-color="blue"]:not(.revealed) .card-front::after {
            background: rgba(33, 150, 243, 0.22);
        }
        body.spymaster-mode .card-wrap[data-color="black"]:not(.revealed) .card-front::after {
            background: rgba(0, 0, 0, 0.5);
        }

        /* ── Controls bar ── */
        #controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 9px 20px;
            font-size: clamp(13px, 1.8vw, 15px);
            font-weight: 600;
            border: none;
            border-radius: 7px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            letter-spacing: 0.3px;
        }
        button:hover:not(:disabled) { opacity: 0.85; transform: translateY(-1px); }
        button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        #end-turn-btn { background: #2d6a4f; color: #fff; }
        #spymaster-btn { background: #6d3b8e; color: #fff; }
        #spymaster-btn.active { background: #9b59b6; }
        #replace-btn { background: #b5530a; color: #fff; }
        #replace-btn.active { background: #e67e22; }
        #no-bomb-btn { background: #3a3a3a; color: #ccc; }
        #no-bomb-btn.active { background: #7a5c00; color: #f4c430; border: 1px solid #f4c43066; }
        #new-game-btn { background: var(--surface); color: var(--text); border: 1px solid rgba(255,255,255,0.15); }

        /* Replace mode: show swap cursor + dim overlay on unrevealed cards */
        body.replace-mode .card-wrap:not(.revealed) { cursor: crosshair; }
        body.replace-mode .card-wrap:not(.revealed) .card-front::before {
            content: '↺';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(20px, 3vw, 32px);
            color: rgba(255,255,255,0.85);
            background: rgba(0,0,0,0.35);
            z-index: 1;
            border-radius: 8px;
            pointer-events: none;
        }

        /* ── Game over modal ── */
        #game-over-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        #game-over-modal.visible { display: flex; }

        #game-over-box {
            background: var(--panel);
            border-radius: 16px;
            padding: 40px 60px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        #game-over-box h2 {
            font-size: clamp(28px, 6vw, 48px);
            font-weight: 800;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #game-over-box p { color: var(--text-muted); margin-bottom: 28px; font-size: 16px; }
        #game-over-box button {
            background: var(--surface);
            color: var(--text);
            padding: 12px 32px;
            font-size: 16px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* ── Error banner ── */
        #error-banner {
            display: none;
            background: rgba(230, 57, 70, 0.15);
            border: 1px solid var(--red);
            color: var(--red);
            border-radius: 8px;
            padding: 12px 20px;
            max-width: 900px;
            width: 100%;
            font-size: 14px;
            text-align: center;
        }
        #error-banner.visible { display: block; }
    </style>
</head>
<body>

    <div id="conn-status">
        <div id="conn-dot"></div>
        <span id="conn-label">Connected</span>
    </div>

    <div id="scores">
        <span class="score-red">RED: <span id="red-count">9</span></span>
        <span class="score-blue">BLUE: <span id="blue-count">8</span></span>
    </div>

    <div id="turn-banner">Waiting for game…</div>

    <div id="error-banner"></div>

    <div id="card-grid"></div>

    <div id="controls">
        <button id="end-turn-btn" onclick="endTurn()">End Turn</button>
        <button id="spymaster-btn" onclick="toggleSpymaster()">Spymaster</button>
        <button id="replace-btn" onclick="toggleReplace()">Replace Images</button>
        <button id="no-bomb-btn" onclick="toggleNoBomb()">☠ Bomb: On</button>
        <button id="new-game-btn" onclick="newGame()">New Game</button>
    </div>

    <!-- Game over modal -->
    <div id="game-over-modal">
        <div id="game-over-box">
            <h2 id="winner-text"></h2>
            <p id="winner-sub"></p>
            <button onclick="newGame()">New Game</button>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const socket = io();
        let currentState = null;
        let isSpymaster = false;
        let isReplaceMode = false;

        // ── Socket events ──────────────────────────────────────────────────
        socket.on('connect', () => {
            setConnStatus('connected');
            socket.emit('get_state');
        });

        socket.on('disconnect', () => setConnStatus('disconnected'));
        socket.on('connect_error', () => setConnStatus('reconnecting'));
        socket.on('reconnecting', () => setConnStatus('reconnecting'));
        socket.on('reconnect', () => setConnStatus('connected'));

        socket.on('state_update', (state) => {
            const isFirst = currentState === null;
            currentState = state;
            if (isFirst) {
                buildCards(state);
            } else {
                updateCards(state);
            }
            renderScores(state);
            renderTurnBanner(state);
            renderControls(state);
            renderModal(state);
        });

        socket.on('error', (data) => showError(data.message));

        // ── Rendering ──────────────────────────────────────────────────────
        function renderScores(state) {
            document.getElementById('red-count').textContent = state.red_remaining;
            document.getElementById('blue-count').textContent = state.blue_remaining;
        }

        function renderTurnBanner(state) {
            const banner = document.getElementById('turn-banner');
            banner.className = '';
            if (state.game_over) {
                banner.textContent = 'Game Over';
            } else {
                const t = state.current_turn;
                banner.textContent = t.toUpperCase() + "'s Turn";
                banner.classList.add('turn-' + t);
            }
        }

        function renderControls(state) {
            const endBtn = document.getElementById('end-turn-btn');
            endBtn.disabled = !!(state.game_over || isSpymaster);

            const gameStarted = state.cards && state.cards.some(c => c.revealed);
            const replaceBtn = document.getElementById('replace-btn');
            replaceBtn.disabled = !!(state.game_over || gameStarted);
            // Auto-exit replace mode once the game has started
            if ((state.game_over || gameStarted) && isReplaceMode) {
                isReplaceMode = false;
                document.body.classList.remove('replace-mode');
                replaceBtn.classList.remove('active');
                replaceBtn.textContent = 'Replace Images';
            }

            // Sync no-bomb button with server state
            const noBombBtn = document.getElementById('no-bomb-btn');
            const noBomb = !!state.no_bomb;
            noBombBtn.textContent = noBomb ? '☠ Bomb: Off' : '☠ Bomb: On';
            noBombBtn.classList.toggle('active', noBomb);
        }

        function renderModal(state) {
            const modal = document.getElementById('game-over-modal');
            if (state.game_over && state.winner) {
                const winnerText = document.getElementById('winner-text');
                const winnerSub = document.getElementById('winner-sub');
                winnerText.textContent = state.winner.toUpperCase() + ' WINS!';
                winnerText.style.color = state.winner === 'red' ? 'var(--red)' : 'var(--blue)';
                winnerSub.textContent = 'Click "New Game" to play again.';
                modal.classList.add('visible');
            } else {
                modal.classList.remove('visible');
            }
        }

        // ── Card DOM ───────────────────────────────────────────────────────
        function buildCards(state) {
            const grid = document.getElementById('card-grid');
            grid.innerHTML = '';
            state.cards.forEach(card => {
                const wrap = document.createElement('div');
                wrap.className = 'card-wrap' + (card.revealed ? ' revealed' : '');
                wrap.dataset.id = card.id;
                wrap.dataset.color = card.color;
                wrap.dataset.image = card.image;

                const inner = document.createElement('div');
                inner.className = 'card-inner';

                const front = document.createElement('div');
                front.className = 'card-face card-front';
                const img = document.createElement('img');
                img.src = '/static/images/' + card.image;
                img.alt = '';
                img.onerror = function() {
                    this.style.display = 'none';
                    this.parentElement.style.backgroundColor = 'var(--surface)';
                };
                front.appendChild(img);

                const back = document.createElement('div');
                back.className = 'card-face card-back color-' + card.color;

                inner.appendChild(front);
                inner.appendChild(back);
                wrap.appendChild(inner);
                grid.appendChild(wrap);
            });
        }

        function updateCards(state) {
            state.cards.forEach(card => {
                const wrap = document.querySelector(`.card-wrap[data-id="${card.id}"]`);
                if (!wrap) return;
                if (card.revealed && !wrap.classList.contains('revealed')) {
                    wrap.classList.add('revealed');
                }
                // Update image if it was swapped via replace_card
                if (wrap.dataset.image !== card.image) {
                    wrap.dataset.image = card.image;
                    const img = wrap.querySelector('img');
                    if (img) {
                        img.style.display = '';
                        wrap.querySelector('.card-front').style.backgroundColor = '';
                        img.src = '/static/images/' + card.image;
                    }
                }
            });
            // Update clickability
            const gameOver = state.game_over;
            document.querySelectorAll('.card-wrap').forEach(w => {
                w.classList.toggle('no-click', gameOver || w.classList.contains('revealed'));
            });
        }

        // ── Card click (event delegation) ──────────────────────────────────
        document.getElementById('card-grid').addEventListener('click', (e) => {
            if (currentState && currentState.game_over) return;

            const wrap = e.target.closest('.card-wrap');
            if (!wrap || wrap.classList.contains('revealed')) return;

            if (isReplaceMode) {
                socket.emit('replace_card', { card_id: parseInt(wrap.dataset.id) });
                return;
            }

            if (isSpymaster) return;
            socket.emit('reveal_card', { card_id: parseInt(wrap.dataset.id) });
        });

        // ── Buttons ────────────────────────────────────────────────────────
        function endTurn() {
            if (isSpymaster) return;
            if (currentState && currentState.game_over) return;
            socket.emit('end_turn');
        }

        function toggleSpymaster() {
            isSpymaster = !isSpymaster;
            document.body.classList.toggle('spymaster-mode', isSpymaster);
            const btn = document.getElementById('spymaster-btn');
            btn.textContent = isSpymaster ? 'Spymaster ✓' : 'Spymaster';
            btn.classList.toggle('active', isSpymaster);
            if (currentState) renderControls(currentState);
        }

        function toggleNoBomb() {
            socket.emit('toggle_no_bomb');
        }

        function toggleReplace() {
            isReplaceMode = !isReplaceMode;
            document.body.classList.toggle('replace-mode', isReplaceMode);
            const btn = document.getElementById('replace-btn');
            btn.textContent = isReplaceMode ? 'Replace Images ✓' : 'Replace Images';
            btn.classList.toggle('active', isReplaceMode);
        }

        function newGame() {
            socket.emit('new_game');
            document.getElementById('game-over-modal').classList.remove('visible');
            // Reset local state for fresh render
            currentState = null;
            isReplaceMode = false;
            document.body.classList.remove('replace-mode');
            document.getElementById('replace-btn').classList.remove('active');
            document.getElementById('replace-btn').textContent = 'Replace Images';
        }

        // ── Connection status ──────────────────────────────────────────────
        function setConnStatus(status) {
            const dot = document.getElementById('conn-dot');
            const label = document.getElementById('conn-label');
            dot.className = status === 'connected' ? '' : status;
            label.textContent = status === 'connected' ? 'Connected'
                              : status === 'disconnected' ? 'Disconnected'
                              : 'Reconnecting…';
        }

        // ── Error banner ───────────────────────────────────────────────────
        function showError(msg) {
            const banner = document.getElementById('error-banner');
            banner.textContent = msg;
            banner.classList.add('visible');
            setTimeout(() => banner.classList.remove('visible'), 8000);
        }
    </script>
</body>
</html>
